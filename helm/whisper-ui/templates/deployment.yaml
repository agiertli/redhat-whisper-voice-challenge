apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-ui
  namespace: {{ include "whisper-ui.namespace" . }}
  labels:
    {{- include "whisper-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: whisper-ui
  template:
    metadata:
      labels:
        {{- include "whisper-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: whisper-ui
      containers:
      - name: whisper-ui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: whisper-ui-config
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
