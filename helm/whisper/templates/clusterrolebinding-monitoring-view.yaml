apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "whisper-ui.fullname" . }}-monitoring-view
  labels:
    {{- include "whisper-ui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: whisper-ui
  namespace: {{ include "whisper-ui.namespace" . }}
